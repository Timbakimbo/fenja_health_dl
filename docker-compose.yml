services:
  db:
    image: postgres:16
    container_name: fenja_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - fenja_pgdata:/var/lib/postgresql/data

volumes:
  fenja_pgdata:
